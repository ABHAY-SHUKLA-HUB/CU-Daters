services:
  - type: web
    name: datee
    env: node
    plan: free
    startCommand: node startup.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://datee.onrender.com
      - key: VITE_APP_URL
        value: https://seeu-daters-found.netlify.app
      - key: FRONTEND_URL
        value: https://seeu-daters.vercel.app
      - key: FRONTEND_PUBLIC_URL
        value: https://seeu-daters.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://seeu-daters.vercel.app,https://www.seeu-daters.vercel.app,https://seeu-daters-git-main-abhay-shukla-hubs-projects.vercel.app
